# Spring Boot Application Properties
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=Spring REST API

# JWT Configuration
jwt.secret=MySecureSecretKeyForJWTTokenGenerationAndValidation12345
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.cognizant.rest=DEBUG

# Spring Web
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

# Documentation
spring.application.description=Spring REST API with JWT Authentication, Country Management, and Spring XML Configuration
